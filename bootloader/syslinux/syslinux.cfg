TIMEOUT 100
PROMPT 1
DEFAULT eunos

LABEL eunos
MENU LABEL EunOS 1.0.0 - Normal Boot
KERNEL /boot/vmlinuz-lts
INITRD /boot/initramfs-lts
APPEND modules=loop,squashfs,sd-mod,usb-storage,virtio,virtio_net,e1000,iwlwifi,iwlmvm,ath9k,ath10k_pci,rtl8192ce,rtl8188ee,r8169 quiet hostname=eunos

LABEL eunos-safe
MENU LABEL EunOS 1.0.0 - Safe Mode
KERNEL /boot/vmlinuz-lts
INITRD /boot/initramfs-lts
APPEND modules=loop,squashfs,sd-mod,usb-storage,virtio,virtio_net,e1000,iwlwifi,iwlmvm,ath9k,ath10k_pci,rtl8192ce hostname=eunos

LABEL eunos-serial
MENU LABEL EunOS 1.0.0 - Serial Console
KERNEL /boot/vmlinuz-lts
INITRD /boot/initramfs-lts
APPEND modules=loop,squashfs,sd-mod,usb-storage,virtio,virtio_net,e1000,iwlwifi,iwlmvm,ath9k quiet hostname=eunos console=ttyS0,115200

LABEL eunos-recovery
MENU LABEL EunOS - Recovery Mode
KERNEL /boot/vmlinuz-lts
INITRD /boot/initramfs-lts
APPEND modules=loop,squashfs,sd-mod,usb-storage,virtio,virtio_net,e1000,iwlwifi,iwlmvm,ath9k,ath10k_pci quiet hostname=eunos eunos.recovery=1
